
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

homeassistant:
  packages: !include_dir_named packages

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
yandex_smart_home: !include yandex_smart_home.yaml



binary_sensor:
  - platform: rpi_gpio
    sensors:
      - port: 25
        name: "button1"
        bouncetime: 80
        pull_mode: "DOWN"

      - port: 24
        name: "button2"
        bouncetime: 80
        pull_mode: "DOWN"

      - port: 23
        name: "button3"
        bouncetime: 80
        pull_mode: "DOWN"

      - port: 18
        name: "button4"
        bouncetime: 80
        pull_mode: "DOWN"

switch:
  - platform: rpi_gpio
    switches:
      - port: 17
        name: "led1"
        unique_id: gpio_led1

      - port: 27
        name: "led2"
        unique_id: gpio_led2

      - port: 22
        name: "led3"
        unique_id: gpio_led3

      - port: 5
        name: "led4"
        unique_id: gpio_led4

      - port: 6
        name: "led5"
        unique_id: gpio_led5

      - port: 13
        name: "led6"
        unique_id: gpio_led6

      - port: 19
        name: "led7"
        unique_id: gpio_led7

      - port: 26
        name: "beeper"
        unique_id: gpio_beeper

      - port: 12
        name: "relay_1"
        unique_id: gpio_relay_1

      - port: 16
        name: "relay_2"
        unique_id: gpio_relay_2

      - port: 20
        name: "relay_3"
        unique_id: gpio_relay_3

      - port: 21
        name: "relay_4"
        unique_id: gpio_relay_4

modbus:
  - name: z031
    type: tcp
    host: 192.168.2.19
    port: 502
    delay: 1
    timeout: 5
    switches:
      - name: "Z031 Главный пуск"
        unique_id: z031_main_start
        slave: 0
        address: 40003
        write_type: holding
        command_on: 1
        command_off: 0
        verify:
          input_type: holding
          address: 40003
          state_on: 1
          state_off: 0

    sensors:
      - name: "Z031 Температура встроенного датчика"
        unique_id: z031_builtin_temperature
        slave: 0
        address: 30000
        input_type: input
        data_type: int16
        scale: 0.1
        precision: 1
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        scan_interval: 5

      - name: "Z031 Скорость вентилятора"
        unique_id: z031_fan_speed
        slave: 0
        address: 40000
        input_type: holding
        data_type: uint16
        scan_interval: 5

      - name: "Z031 Главный режим"
        unique_id: z031_main_mode
        slave: 0
        address: 40001
        input_type: holding
        data_type: uint16
        scan_interval: 5

      - name: "Z031 Главная уставка температуры"
        unique_id: z031_main_temperature_setpoint_read
        slave: 0
        address: 40002
        input_type: holding
        data_type: uint16
        unit_of_measurement: "°C"
        device_class: temperature
        scan_interval: 5

      - name: "Z031 Температура приточного воздуха"
        unique_id: z031_supply_air_temperature
        slave: 0
        address: 40009
        input_type: holding
        data_type: int16
        scale: 0.1
        precision: 1
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        scan_interval: 5

climate:
  - platform: climate_template
    name: "Z031 Вентиляция"
    unique_id: z031_ventilation_climate
    icon: mdi:hvac
    modes:
      - "off"
      - "fan_only"
      - "heat"
    fan_modes:
      - "low"
      - "medium"
      - "high"
    min_temp: 15
    max_temp: 30
    precision: 0.1
    temp_step: 1
    availability_template: >
      {{ has_value('sensor.z031_temperatura_pritochnogo_vozdukha')
         and has_value('sensor.z031_glavnaia_ustavka_temperatury')
         and has_value('sensor.z031_glavnyi_rezhim')
         and has_value('sensor.z031_skorost_ventiliatora')
         and has_value('switch.z031_glavnyi_pusk') }}
    current_temperature_template: >
      {{ states('sensor.z031_temperatura_pritochnogo_vozdukha') }}
    target_temperature_template: >
      {{ states('sensor.z031_glavnaia_ustavka_temperatury') }}
    hvac_mode_template: >
      {% if is_state('switch.z031_glavnyi_pusk', 'off') %}
        off
      {% else %}
        {% set mode = states('sensor.z031_glavnyi_rezhim') | int(1) %}
        {% if mode == 2 %}
          heat
        {% else %}
          fan_only
        {% endif %}
      {% endif %}
    hvac_action_template: >
      {% if is_state('switch.z031_glavnyi_pusk', 'off') %}
        off
      {% else %}
        {% set mode = states('sensor.z031_glavnyi_rezhim') | int(1) %}
        {% if mode == 2 %}
          heating
        {% else %}
          fan
        {% endif %}
      {% endif %}
    fan_mode_template: >
      {% set speed = states('sensor.z031_skorost_ventiliatora') | int(0) %}
      {% if speed == 0 %}
        none
      {% elif speed == 1 %}
        low
      {% elif speed == 2 %}
        medium
      {% else %}
        high
      {% endif %}
    set_hvac_mode:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ hvac_mode == 'off' }}"
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: switch.z031_glavnyi_pusk
          - conditions:
              - condition: template
                value_template: "{{ hvac_mode == 'heat' }}"
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.z031_glavnyi_pusk
              - action: modbus.write_register
                data:
                  hub: z031
                  slave: 0
                  address: 40001
                  value: 2
        default:
          - action: switch.turn_on
            target:
              entity_id: switch.z031_glavnyi_pusk
          - action: modbus.write_register
            data:
              hub: z031
              slave: 0
              address: 40001
              value: 1
    set_temperature:
      - action: modbus.write_register
        data:
          hub: z031
          slave: 0
          address: 40002
          value: "{{ temperature | round(0) | int }}"
    set_fan_mode:
      - action: modbus.write_register
        data:
          hub: z031
          slave: 0
          address: 40000
          value: >
            {% if fan_mode == 'low' %}
              1
            {% elif fan_mode == 'medium' %}
              2
            {% else %}
              3
            {% endif %}