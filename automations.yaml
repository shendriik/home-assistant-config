      entity_id: switch.led5
  mode: single
- id: '1762716536130'
  alias: Turn off alarm button handler
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - input_button.turn_off_alarm_virtual_button
  - trigger: state
    entity_id:
    - binary_sensor.button3_2
    from:
    - 'off'
    to:
    - 'on'
  conditions:
  - condition: state
    entity_id: input_boolean.leak_detected
    state:
    - 'on'
  actions:
  - if:
    - condition: and
      conditions:
      - condition: state
        entity_id: binary_sensor.any_water_leak
        state:
        - 'off'
    then:
    - action: input_boolean.turn_off
      metadata: {}
      data: {}
      target:
        entity_id: input_boolean.leak_detected
    - action: switch.turn_off
      metadata: {}
      data: {}
      target:
        entity_id: switch.led3
    - action: timer.cancel
      metadata: {}
      data: {}
      target:
        entity_id: timer.leak_alarm_notification_timer
    - action: persistent_notification.create
      metadata: {}
      data:
        title: Протечка устранена
        message: Система переведена в дежурный режим работы, можно открыть краны
    else:
    - action: persistent_notification.create
      metadata: {}
      data:
        title: Запрещено
        message: Нельзя снять режим "Авария" при сработавших датчиках протечки
  mode: single
- id: '1762716676141'
  alias: Protect from the leak
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - input_boolean.leak_detected
    to:
    - 'on'
  conditions: []
  actions:
  - action: timer.start
    metadata: {}
    data: {}
    target:
      entity_id: timer.leak_alarm_notification_timer
  - action: switch.turn_on
    metadata: {}
    data: {}
    target:
      entity_id: switch.led3
  - action: script.beep
    metadata: {}
    data: {}
  - if:
    - condition: state
      entity_id: input_boolean.valve_1_state
      state:
      - 'on'
    then:
    - action: script.start_closing_valve_1
      metadata: {}
      data: {}
  - if:
    - condition: state
      entity_id: input_boolean.valve_2_state
      state:
      - 'on'
    then:
    - action: script.start_closing_valve_2
      metadata: {}
      data: {}
  mode: single
- id: '1762722612315'
  alias: Valve 1 button click handler
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - input_button.valve_1_virtual_button
  - trigger: state
    entity_id:
    - binary_sensor.button1_2
    from:
    - 'off'
    to:
    - 'on'
  conditions: []
  actions:
  - if:
    - condition: state
      entity_id: input_boolean.valve_1_state
      state:
      - 'on'
    then:
    - action: script.start_closing_valve_1
      metadata: {}
      data: {}
    else:
    - if:
      - condition: state
        entity_id: input_boolean.leak_detected
        state:
        - 'on'
      then:
      - action: persistent_notification.create
        metadata: {}
        data:
          title: Запрещено
          message: Невозможно открыть кран в состоянии "Авария"
      - stop: Невозможно открыть кран в состоянии "Авария"
        error: true
      else:
      - action: script.start_opening_valve_1
        metadata: {}
        data: {}
  - action: persistent_notification.create
    metadata: {}
    data:
      message: Производится управление краном холодной воды
      title: ' Ручное управление'
  mode: single
- id: '1762765008061'
  alias: Periodic leak alarm notification
  description: ''
  triggers:
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.leak_alarm_notification_timer
  conditions:
  - condition: state
    entity_id: input_boolean.leak_detected
    state:
    - 'on'
  actions:
  - action: timer.start
    metadata: {}
    data: {}
    target:
      entity_id: timer.leak_alarm_notification_timer
  - if:
    - condition: state
      entity_id: input_boolean.valve_1_state
      state:
      - 'on'
    then:
    - action: script.start_closing_valve_1
      metadata: {}
      data: {}
    alias: Close valve 1 if accidentally opened
  - if:
    - condition: state
      entity_id: input_boolean.valve_2_state
      state:
      - 'on'
    then:
    - action: script.start_closing_valve_2
      metadata: {}
      data: {}
    alias: Close valve 2 if accidentally opened
  - action: persistent_notification.create
    metadata: {}
    data:
      title: Протечка
      message: Устраните протечку и выключите состояние "Авария"
  mode: single
