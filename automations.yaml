  alias: Stop valve 1
  description: ''
  triggers:
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.valve_1_timer
  conditions: []
  actions:
  - action: switch.turn_off
    metadata: {}
    data: {}
    target:
      entity_id: switch.relay_1
  - action: switch.turn_off
    metadata: {}
    data: {}
    target:
      entity_id: switch.relay_2
  - action: switch.turn_off
    metadata: {}
