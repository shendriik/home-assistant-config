beep:
  sequence:
  - repeat:
      count: 4
      sequence:
      - action: switch.turn_on
        metadata: {}
        target:
          entity_id: switch.beeper
        data: {}
      - delay:
          hours: 0
          minutes: 0
          seconds: 0
          milliseconds: 100
      - action: switch.turn_off
        metadata: {}
        target:
          entity_id: switch.beeper
        data: {}
      - delay:
          hours: 0
          minutes: 0
          seconds: 0
          milliseconds: 100
  alias: Beep
  description: ''
start_closing_valve_1:
  sequence:
  - if:
    - condition: state
      entity_id: timer.valve_1_timer
      state:
      - idle
      enabled: true
    then:
    - action: switch.turn_on
      metadata: {}
      data: {}
      target:
        entity_id: switch.relay_2
    - action: switch.turn_on
      metadata: {}
      data: {}
      target:
        entity_id: switch.led5
    - action: timer.start
      metadata: {}
      data: {}
      target:
        entity_id: timer.valve_1_timer
  alias: Start closing valve 1
  description: ''
start_opening_valve_1:
  sequence:
  - if:
    - condition: state
      entity_id: timer.valve_1_timer
      state:
      - idle
    then:
    - action: switch.turn_on
      metadata: {}
      data: {}
      target:
        entity_id: switch.relay_1
    - action: switch.turn_on
      metadata: {}
      data: {}
      target:
        entity_id: switch.led5
    - action: timer.start
      metadata: {}
      data: {}
      target:
        entity_id: timer.valve_1_timer
  alias: Start opening valve 1
  description: ''
start_closing_valve_2:
  sequence:
  - if:
    - condition: state
