unknown_valve_state_beep:
  sequence:
  - repeat:
      count: 2
      sequence:
      - action: switch.turn_on
        metadata: {}
        target:
          entity_id: switch.beeper
        data: {}
      - delay:
          hours: 0
          minutes: 0
          seconds: 0
          milliseconds: 25
      - action: switch.turn_off
        metadata: {}
        target:
          entity_id: switch.beeper
        data: {}
      - if:
        - condition: template
          value_template: '{{ repeat.index < 2 }}'
        then:
        - delay:
            hours: 0
            minutes: 0
            seconds: 0
            milliseconds: 50
  alias: Unknown valve state beep
  description: ''

request_open_valve_1:
  alias: Request open valve 1
  description: Пользовательский запрос на открытие крана холодной воды с проверками безопасности.
  mode: single
  sequence:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.leak_detected
        state: 'on'
      sequence:
      - action: persistent_notification.create
        data:
          title: Запрещено
          message: Невозможно открыть холодную воду в состоянии "Авария"
      - stop: Невозможно открыть холодную воду в состоянии "Авария"
        error: false
    - conditions:
      - condition: state
        entity_id: input_boolean.valve_1_state_unknown
        state: 'on'
      sequence:
      - action: persistent_notification.create
        data:
          title: Требуется проверка
          message: Состояние холодной воды не подтверждено. Для безопасного восстановления сначала закройте кран.
      - stop: Состояние холодной воды не подтверждено
        error: false
    - conditions:
      - condition: template
        value_template: "{{ not is_state('timer.valve_1_timer', 'idle') }}"
      sequence:
      - action: persistent_notification.create
        data:
          title: Команда отклонена
          message: Кран холодной воды уже выполняет операцию. Дождитесь завершения таймера.
      - stop: Кран холодной воды уже выполняет операцию
        error: false
    - conditions:
      - condition: state
        entity_id: input_boolean.valve_1_state
        state: 'on'
      sequence:
      - action: persistent_notification.create
        data:
          title: Без изменений
          message: Холодная вода уже открыта
    default:
    - action: script.start_opening_valve_1
      data: {}
    - action: persistent_notification.create
      data:
        title: Ручное управление
        message: Производится открытие холодной воды
request_close_valve_1:
  alias: Request close valve 1
  description: Пользовательский запрос на закрытие крана холодной воды с проверками текущего состояния.
  mode: single
  sequence:
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ not is_state('timer.valve_1_timer', 'idle') }}"
      sequence:
      - action: persistent_notification.create
        data:
          title: Команда отклонена
          message: Кран холодной воды уже выполняет операцию. Дождитесь завершения таймера.
      - stop: Кран холодной воды уже выполняет операцию
        error: false
    - conditions:
      - condition: state
        entity_id: input_boolean.valve_1_state
        state: 'off'
      - condition: state
        entity_id: input_boolean.valve_1_state_unknown
        state: 'off'
      sequence:
      - action: persistent_notification.create
        data:
          title: Без изменений
          message: Холодная вода уже перекрыта
    default:
    - action: script.start_closing_valve_1
      data: {}
    - action: persistent_notification.create
      data:
        title: Ручное управление
        message: Производится закрытие холодной воды
request_toggle_valve_1:
  alias: Request toggle valve 1
  description: Пользовательский запрос на переключение крана холодной воды через request-слой.
  mode: single
  sequence:
  - if:
    - condition: or
      conditions:
      - condition: state
        entity_id: input_boolean.valve_1_state
        state: 'on'
      - condition: state
        entity_id: input_boolean.valve_1_state_unknown
        state: 'on'
    then:
    - action: script.request_close_valve_1
      data: {}
    else:
    - action: script.request_open_valve_1
      data: {}
